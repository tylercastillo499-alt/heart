<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animación de Corazón con Partículas</title>
  <style>
    body {
      margin: 0;
      background-color: #050505;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    /* Ocultamos el SVG original porque solo lo usamos para extraer los puntos */
    svg {
      display: none;
    }
    /* El lienzo de WebGL donde se dibuja el brillo */
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }
  </style>
  <!-- Cargamos Three.js y GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

  <!-- El SVG con la forma de corazón para extraer el camino ("path") -->
  <svg viewBox="0 0 100 100">
    <path id="heart-path" d="M 50,30 C 60,10 90,15 90,45 C 90,70 50,95 50,95 C 50,95 10,70 10,45 C 10,15 40,10 50,30 Z" />
  </svg>

  <script>
    // 1. CONFIGURACIÓN DE LA ESCENA EN 3D (THREE.JS)
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
    camera.position.z = 150;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // 2. EXTRAER LOS PUNTOS DEL CORAZÓN DESDE EL SVG
    const path = document.querySelector("#heart-path");
    const length = path.getTotalLength();
    const vertices = [];

    // Ajustes para centrar y escalar el corazón en el espacio 3D
    const scaleFactor = 1.8;
    const offsetX = -50 * scaleFactor;
    const offsetY = 50 * scaleFactor; // Invertimos Y para que no salga de cabeza

    // Creamos la línea de tiempo de GSAP
    const tl = gsap.timeline();

    for (let i = 0; i < length; i += 0.1) {
      const point = path.getPointAtLength(i);
      
      // Creamos el vector en 3D escalado y centrado
      const vector = new THREE.Vector3(
        point.x * scaleFactor + offsetX, 
        -point.y * scaleFactor + offsetY, 
        0
      );
      
      // Añadimos la dispersión/ruido aleatorio original de tu código
      vector.x += (Math.random() - 0.5) * 30;
      vector.y += (Math.random() - 0.5) * 30;
      vector.z += (Math.random() - 0.5) * 70;
      
      vertices.push(vector);

      // ANIMACIÓN GSAP: Vuelan desde el centro (300, -276) hacia su posición final con dispersión
      tl.from(vector, {
        x: 0,
        y: 0,
        z: 0,
        ease: "power2.inOut",
        duration: "random(2, 5)"
      }, i * 0.002);
    }

    // 3. CREAR LAS PARTÍCULAS VISUALES (EL BRILLO)
    const geometry = new THREE.BufferGeometry().setFromPoints(vertices);

    // Creamos un material brillante rosa con textura de punto suave
    const pTexture = createCircleTexture();
    const material = new THREE.PointsMaterial({
      color: 0xff4da6, // Rosa brillante espectacular
      size: 1.8,
      map: pTexture,
      transparent: true,
      blending: THREE.AdditiveBlending, // Hace que al encimarse brillen más
      depthWrite: false
    });

    const particleSystem = new THREE.Points(geometry, material);
    scene.add(particleSystem);

    // Función auxiliar para generar una textura de partícula suave (brillo circular)
    function createCircleTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 16;
      canvas.height = 16;
      const ctx = canvas.getContext('2d');
      const grad = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
      grad.addColorStop(0, 'rgba(255,255,255,1)');
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 16, 16);
      return new THREE.CanvasTexture(canvas);
    }

    // 4. BUCLE DE RENDERIZADO Y ACTUALIZACIÓN CONTINUA
    function animate() {
      requestAnimationFrame(animate);
      
      // Le indicamos a Three.js que actualice las coordenadas modificadas por GSAP
      geometry.setFromPoints(vertices);
      geometry.attributes.position.needsUpdate = true;
      
      // Una rotación muy sutil para darle volumen 3D
      particleSystem.rotation.y = Math.sin(Date.now() * 0.0005) * 0.15;
      particleSystem.rotation.x = Math.cos(Date.now() * 0.0005) * 0.05;

      renderer.render(scene, camera);
    }
    
    animate();

    // Ajustar el canvas si se cambia el tamaño de la ventana
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
