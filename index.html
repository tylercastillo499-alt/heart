<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animación de Corazón Compacto</title>
  <style>
    body {
      margin: 0;
      background-color: #050505;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    svg {
      display: none;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

  <svg viewBox="0 0 100 100">
    <path id="heart-path" d="M 50,30 C 60,10 90,15 90,45 C 90,70 50,95 50,95 C 50,95 10,70 10,45 C 10,15 40,10 50,30 Z" />
  </svg>

  <script>
    // 1. CONFIGURACIÓN DE LA ESCENA
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
    camera.position.z = 150;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // 2. EXTRAER PUNTOS DEL SVG
    const path = document.querySelector("#heart-path");
    const length = path.getTotalLength();
    const vertices = [];

    const scaleFactor = 1.8;
    const offsetX = -50 * scaleFactor;
    const offsetY = 50 * scaleFactor;

    const tl = gsap.timeline();

    // Reducimos el paso a 0.05 para duplicar los puntos y que el trazo se vea más denso y lleno
    for (let i = 0; i < length; i += 0.05) {
      const point = path.getPointAtLength(i);
      
      const vector = new THREE.Vector3(
        point.x * scaleFactor + offsetX, 
        -point.y * scaleFactor + offsetY, 
        0
      );
      
      // CAMBIO CLAVE: Dispersión súper reducida para que las partículas se queden pegadas al borde
      vector.x += (Math.random() - 0.5) * 6;
      vector.y += (Math.random() - 0.5) * 6;
      vector.z += (Math.random() - 0.5) * 10;
      
      vertices.push(vector);

      // Animación desde el centro
      tl.from(vector, {
        x: 0,
        y: 0,
        z: 0,
        ease: "power2.inOut",
        duration: "random(2, 4.5)"
      }, i * 0.0015); // Un retraso ligeramente más rápido
    }

    // 3. CREAR SISTEMA DE PARTÍCULAS
    const geometry = new THREE.BufferGeometry().setFromPoints(vertices);
    const pTexture = createCircleTexture();
    
    const material = new THREE.PointsMaterial({
      color: 0xff3b93, // Rosa intenso mágico
      size: 1.5,       // Partículas ligeramente más finas y elegantes
      map: pTexture,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const particleSystem = new THREE.Points(geometry, material);
    scene.add(particleSystem);

    function createCircleTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 16;
      canvas.height = 16;
      const ctx = canvas.getContext('2d');
      const grad = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
      grad.addColorStop(0, 'rgba(255,255,255,1)');
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 16, 16);
      return new THREE.CanvasTexture(canvas);
    }

    // 4. ANIMACIÓN DE RENDERIZADO
    function animate() {
      requestAnimationFrame(animate);
      
      geometry.setFromPoints(vertices);
      geometry.attributes.position.needsUpdate = true;
      
      // Rotación en 3D muy suave para apreciar el volumen
      particleSystem.rotation.y = Math.sin(Date.now() * 0.0004) * 0.12;
      particleSystem.rotation.x = Math.cos(Date.now() * 0.0004) * 0.04;

      renderer.render(scene, camera);
    }
    
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
